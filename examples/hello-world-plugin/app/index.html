<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World Plugin</title>
  <style>
    /* ── Variables de diseño ─────────────────────────────────────────── */
    :root {
      --bg-primary:   #0f172a;
      --bg-card:      #1e293b;
      --bg-input:     #0f172a;
      --accent:       #6366f1;
      --accent-hover: #4f46e5;
      --text-primary: #f1f5f9;
      --text-muted:   #94a3b8;
      --border:       #334155;
      --success:      #22c55e;
      --error:        #ef4444;
      --radius:       12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    .header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 { font-size: 20px; font-weight: 600; }
    .header p  { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }

    /* ── Contenido principal ─────────────────────────────────────────── */
    .main {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Tarjeta ─────────────────────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    /* ── Área de chat ─────────────────────────────────────────────────── */
    .chat-messages {
      min-height: 200px;
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 85%;
    }

    .message.user {
      background: var(--accent);
      align-self: flex-end;
      color: white;
    }

    .message.assistant {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      align-self: flex-start;
      color: var(--text-primary);
    }

    .message.system {
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--text-muted);
      font-size: 13px;
      align-self: center;
      max-width: 100%;
      text-align: center;
    }

    /* ── Formulario de entrada ────────────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 10px;
    }

    .input-row input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: var(--accent);
    }

    .input-row input::placeholder {
      color: var(--text-muted);
    }

    /* ── Botones ─────────────────────────────────────────────────────── */
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Selector de modelo ───────────────────────────────────────────── */
    .model-selector {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .model-selector label {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .model-selector select {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    /* ── Indicador de carga ───────────────────────────────────────────── */
    .loading {
      display: none;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 13px;
      padding: 8px 0;
    }

    .loading.active { display: flex; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <div>
      <h1>Hello World Plugin</h1>
      <p>Plugin de ejemplo — Pinokio + Ollama</p>
    </div>
  </div>

  <!-- Contenido principal -->
  <div class="main">

    <!-- Tarjeta de chat -->
    <div class="card">
      <h2>Chat con IA Local</h2>

      <!-- Selector de modelo -->
      <div class="model-selector">
        <label>Modelo:</label>
        <select id="modelSelect" onchange="onModelChange()">
          <option value="llama3.2:1b">llama3.2:1b (2GB RAM)</option>
          <option value="llama3.2:3b" selected>llama3.2:3b (4GB RAM)</option>
          <option value="llama3.1:8b">llama3.1:8b (8GB RAM)</option>
          <option value="qwen2.5:7b">qwen2.5:7b (8GB RAM, español)</option>
        </select>
      </div>

      <!-- Mensajes del chat -->
      <div class="chat-messages" id="chatMessages">
        <div class="message system">
          Escribe un mensaje para comenzar a chatear con la IA local.
          El modelo se ejecuta completamente en tu computadora, sin conexión a internet.
        </div>
      </div>

      <!-- Indicador de carga -->
      <div class="loading" id="loadingIndicator">
        <div class="spinner"></div>
        <span>El modelo está generando una respuesta...</span>
      </div>

      <!-- Formulario de entrada -->
      <div class="input-row">
        <input
          type="text"
          id="messageInput"
          placeholder="Escribe tu mensaje aquí..."
          onkeydown="onKeyDown(event)"
        >
        <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()">
          Enviar
        </button>
      </div>
    </div>

  </div>

  <script>
    /*
     * REGLAS JAVASCRIPT PARA PINOKIO:
     * 1. Usar var en lugar de let/const
     * 2. Definir todas las funciones en scope global (no en DOMContentLoaded)
     * 3. Llamar a init() al final del script, no en DOMContentLoaded
     */

    // ── Variables globales ────────────────────────────────────────────────
    var selectedModel = "llama3.2:3b";
    var isLoading = false;

    // ── Funciones de UI ───────────────────────────────────────────────────

    function addMessage(role, text) {
      var container = document.getElementById("chatMessages");

      // Eliminar el mensaje de bienvenida si existe
      var systemMsg = container.querySelector(".message.system");
      if (systemMsg) systemMsg.remove();

      var div = document.createElement("div");
      div.className = "message " + role;
      div.textContent = text;
      container.appendChild(div);

      // Scroll al último mensaje
      container.scrollTop = container.scrollHeight;
    }

    function setLoading(loading) {
      isLoading = loading;
      var indicator = document.getElementById("loadingIndicator");
      var btn = document.getElementById("sendBtn");
      var input = document.getElementById("messageInput");

      if (loading) {
        indicator.classList.add("active");
        btn.disabled = true;
        input.disabled = true;
      } else {
        indicator.classList.remove("active");
        btn.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    function onModelChange() {
      selectedModel = document.getElementById("modelSelect").value;
    }

    function onKeyDown(event) {
      if (event.key === "Enter" && !isLoading) {
        sendMessage();
      }
    }

    // ── Función principal: enviar mensaje ─────────────────────────────────

    function sendMessage() {
      var input = document.getElementById("messageInput");
      var message = input.value.trim();

      if (!message || isLoading) return;

      // Mostrar mensaje del usuario
      addMessage("user", message);
      input.value = "";

      // Iniciar estado de carga
      setLoading(true);

      // Llamar al backend
      fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: message,
          model: selectedModel
        })
      })
      .then(function(response) {
        if (!response.ok) {
          return response.json().then(function(err) {
            throw new Error(err.detail || "Error del servidor");
          });
        }
        return response.json();
      })
      .then(function(data) {
        addMessage("assistant", data.response);
      })
      .catch(function(error) {
        addMessage("system", "Error: " + error.message);
      })
      .finally(function() {
        setLoading(false);
      });
    }

    // ── Función de inicialización ─────────────────────────────────────────

    function loadAvailableModels() {
      fetch("/api/models")
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.models && data.models.length > 0) {
            var select = document.getElementById("modelSelect");
            // Marcar como seleccionado el primer modelo disponible
            for (var i = 0; i < select.options.length; i++) {
              if (data.models.indexOf(select.options[i].value) !== -1) {
                select.selectedIndex = i;
                selectedModel = select.options[i].value;
                break;
              }
            }
          }
        })
        .catch(function() {
          // Silenciar error — usar modelo por defecto
        });
    }

    function init() {
      loadAvailableModels();
      document.getElementById("messageInput").focus();
    }

    // Inicializar al final del script (no en DOMContentLoaded)
    init();
  </script>

</body>
</html>
